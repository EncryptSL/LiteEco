# noinspection YAMLSchemaValidation
name: ${name}
main: com.github.encryptsl.lite.eco.LiteEco
version: ${version}
api-version: 1.20
folia-supported: true


prefix: LiteEco
author: EncryptSL
contributors: [LcyDev, Schneidertm, sysnote8main, SnowCutieOwO, firestorm942, TigerX6, Triis0007, ogsammaenr]
website: https://encryptsl.github.io

load: STARTUP
softdepend: [PlaceholderAPI, Vault, MiniPlaceholders, BetterEconomy, TheosisEconomy, SimpleEconomy, Economy, EzEconomy, PlayerPoints]
libraries:
  - com.tchristofferson:ConfigUpdater:2.2
  - com.zaxxer:HikariCP:7.0.2
  - de.exlll:configlib-core:4.8.1
  - de.exlll:configlib-yaml:4.8.1
  - io.ktor:ktor-client-content-negotiation-jvm:3.4.3
  - io.ktor:ktor-client-core-jvm:3.4.3
  - io.ktor:ktor-client-java-jvm:3.4.3
  - io.ktor:ktor-events-jvm:3.4.3
  - io.ktor:ktor-http-cio-jvm:3.4.3
  - io.ktor:ktor-http-jvm:3.4.3
  - io.ktor:ktor-io-jvm:3.4.3
  - io.ktor:ktor-network-jvm:3.4.3
  - io.ktor:ktor-serialization-gson-jvm:3.4.3
  - io.ktor:ktor-serialization-jvm:3.4.3
  - io.ktor:ktor-sse-jvm:3.4.3
  - io.ktor:ktor-utils-jvm:3.4.3
  - io.ktor:ktor-websocket-serialization-jvm:3.4.3
  - io.ktor:ktor-websockets-jvm:3.4.3
  - org.apache.commons:commons-csv:1.14.1
  - org.flywaydb:flyway-core:12.8.1
  - org.flywaydb:flyway-mysql:12.8.1
  - org.incendo:cloud-brigadier:2.0.0-beta.16
  - org.incendo:cloud-bukkit:2.0.0-beta.16
  - org.incendo:cloud-core:2.0.0
  - org.incendo:cloud-kotlin-extensions:2.0.0
  - org.incendo:cloud-minecraft-extras:2.0.0-beta.16
  - org.incendo:cloud-paper:2.0.0-beta.16
  - org.incendo:cloud-services:2.0.0
  - org.jetbrains.exposed:exposed-core:1.3.0
  - org.jetbrains.exposed:exposed-jdbc:1.3.0
  - org.jetbrains.exposed:exposed-kotlin-datetime:1.3.0
  - org.jetbrains.exposed:exposed-migration:1.0.0-beta-5
  - org.jetbrains.kotlin:kotlin-reflect:2.4.0
  - org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.0.0
  - org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.0.0
  - org.jetbrains.kotlin:kotlin-stdlib:2.4.0
  - org.jetbrains.kotlinx:kotlinx-coroutines-core-jvm:1.11.0
  - org.jetbrains.kotlinx:kotlinx-coroutines-jdk8:1.11.0
  - org.jetbrains.kotlinx:kotlinx-coroutines-slf4j:1.11.0
  - org.jetbrains.kotlinx:kotlinx-datetime-jvm:0.7.1-0.6.x-compat
  - org.jetbrains.kotlinx:kotlinx-serialization-core-jvm:1.9.0
  - org.mariadb.jdbc:mariadb-java-client:3.5.8
  - org.postgresql:postgresql:42.7.11
  - org.xerial:sqlite-jdbc:3.53.2.0

description: ${description}

permissions:
  lite.eco.player:
    default: true
    description: Gives access to all player commands
    children:
      lite.eco.help: true
      lite.eco.money: true
      lite.eco.balance: true
      lite.eco.balance.dollars: true
      lite.eco.top: true
      lite.eco.pay: true
      lite.eco.pay.dollars: true
      lite.eco.pay.*: false
      lite.eco.balance.*: false

  lite.eco.admin:
    default: op
    description: Gives access to all admin commands
    children:
      lite.eco.admin.help: true
      lite.eco.admin.eco: true
      lite.eco.admin.add: true
      lite.eco.admin.global.add: true
      lite.eco.admin.set: true
      lite.eco.admin.global.set: true
      lite.eco.admin.withdraw: true
      lite.eco.admin.global.withdraw: true
      lite.eco.admin.create: true
      lite.eco.admin.delete: true
      lite.eco.admin.monolog: true
      lite.eco.admin.lang: true
      lite.eco.admin.purge: true
      lite.eco.admin.export: true
      lite.eco.admin.import: true
      lite.eco.admin.reload: true
      # Debugging permissions
      lite.eco.admin.debug.failmode: true
      lite.eco.admin.debug.testjanitor: true
      lite.eco.admin.debug.janitor: true
      lite.eco.admin.debug.inspect: true
      lite.eco.admin.debug.stress: true
      # Bypass and player permissions
      lite.eco.admin.bypass.limit: true
      lite.eco.pay.*: true
      lite.eco.balance.others: true
      lite.eco.balance.*: true